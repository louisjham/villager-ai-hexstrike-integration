version: '3.8'

services:
  villager-ai:
    build: .
    container_name: villager-ai
    ports:
      - "37695:37695"
    env_file:
      - .env
    environment:
      - VILLAGER_HOST=0.0.0.0
      - VILLAGER_PORT=37695
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:37695/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - villager-network

networks:
  villager-network:
    driver: bridge

volumes:
  logs:
  data:
